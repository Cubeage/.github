# Reusable Firebase App Distribution Workflow
#
# Uploads an Android APK/AAB to Firebase App Distribution for tester access.
# Requires FIREBASE_CREDENTIALS (service account JSON) and FIREBASE_APP_ID secrets.
#
# Usage in your repo's workflow:
#   jobs:
#     distribute:
#       needs: build
#       uses: Cubeage/.github/.github/workflows/firebase-app-distribution.yml@main
#       with:
#         app-id: ${{ secrets.FIREBASE_APP_ID }}
#         artifact-name: android-build
#         release-notes: "SDK v3.1.68 update"
#         groups: "qa-testers"
#       secrets:
#         FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}

name: Firebase App Distribution

on:
  workflow_call:
    inputs:
      app-id:
        description: "Firebase Android App ID"
        required: true
        type: string
      artifact-name:
        description: "Name of the GitHub Actions artifact containing the APK"
        required: true
        type: string
      release-notes:
        description: "Release notes for this distribution"
        required: false
        type: string
        default: "Automated build from CI"
      groups:
        description: "Tester groups (comma-separated)"
        required: false
        type: string
        default: "qa-testers"
    secrets:
      FIREBASE_CREDENTIALS:
        required: true

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./build-output

      - name: Find APK
        id: find-apk
        run: |
          APK=$(find ./build-output -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found in artifact"
            exit 1
          fi
          echo "apk-path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_CREDENTIALS }}

      - name: Upload to Firebase App Distribution
        uses: google-github-actions/firebase-app-distribution@v2
        with:
          appId: ${{ inputs.app-id }}
          serviceAccount: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: ${{ inputs.groups }}
          file: ${{ steps.find-apk.outputs.apk-path }}
          releaseNotes: ${{ inputs.release-notes }}
