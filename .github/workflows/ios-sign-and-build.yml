# Reusable iOS Code Signing + Build Workflow
# 
# Usage in your repo's workflow:
#   jobs:
#     build:
#       uses: Cubeage/.github/.github/workflows/ios-sign-and-build.yml@main
#       with:
#         scheme: MyApp
#         export-method: app-store  # or: ad-hoc, development, enterprise
#       secrets:
#         BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
#         P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
#         PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
#         KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
#
# How to prepare secrets:
#   BUILD_CERTIFICATE_BASE64:    base64 -i YourCert.p12 | pbcopy
#   P12_PASSWORD:                the password you set when exporting the .p12
#   PROVISIONING_PROFILE_BASE64: base64 -i YourProfile.mobileprovision | pbcopy
#   KEYCHAIN_PASSWORD:           openssl rand -base64 32  (any random string)

on:
  workflow_call:
    inputs:
      scheme:
        description: "Xcode scheme to build"
        required: true
        type: string
      configuration:
        description: "Build configuration (Debug/Release)"
        required: false
        default: "Release"
        type: string
      export-method:
        description: "Export method: app-store, ad-hoc, development, enterprise"
        required: false
        default: "app-store"
        type: string
      xcode-path:
        description: "Path to Xcode.app"
        required: false
        default: "/Applications/Xcode.app"
        type: string
    secrets:
      BUILD_CERTIFICATE_BASE64:
        description: "Base64-encoded .p12 certificate"
        required: true
      P12_PASSWORD:
        description: "Password for the .p12 certificate"
        required: true
      PROVISIONING_PROFILE_BASE64:
        description: "Base64-encoded .mobileprovision file"
        required: true
      KEYCHAIN_PASSWORD:
        description: "Password for temporary build keychain (any random strong string)"
        required: true
    outputs:
      ipa-path:
        description: "Path to the exported .ipa file"
        value: ${{ jobs.build.outputs.ipa-path }}

jobs:
  build:
    name: iOS Build (${{ inputs.scheme }})
    runs-on: [self-hosted, sylphx, macos, standard]
    outputs:
      ipa-path: ${{ steps.export.outputs.ipa-path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Xcode version
        run: sudo xcode-select -s ${{ inputs.xcode-path }}/Contents/Developer

      # ── Code Signing Setup ──────────────────────────────────────────────────
      - name: Install signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Each build gets a unique temp keychain — fully isolated between orgs/builds
          KEYCHAIN_NAME="build-${{ github.run_id }}-${{ github.run_attempt }}.keychain-db"
          KEYCHAIN_PATH="$RUNNER_TEMP/$KEYCHAIN_NAME"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_NAME=$KEYCHAIN_NAME" >> $GITHUB_ENV

          # Create and unlock temp keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Allow codesign to access without UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          echo "Certificate installed to isolated temp keychain"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          echo -n "$PROFILE_BASE64" | base64 --decode -o "$RUNNER_TEMP/profile.mobileprovision"

          # Install with UUID as filename (standard macOS approach)
          UUID=$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" \
            | /usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin)

          cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILES_DIR/$UUID.mobileprovision"
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "Provisioning profile installed: $UUID"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build archive
        run: |
          xcodebuild archive \
            -scheme "${{ inputs.scheme }}" \
            -configuration "${{ inputs.configuration }}" \
            -archivePath "$RUNNER_TEMP/build/${{ inputs.scheme }}.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_UUID"

      - name: Export IPA
        id: export
        run: |
          EXPORT_DIR="$RUNNER_TEMP/export"
          mkdir -p "$EXPORT_DIR"

          cat > "$RUNNER_TEMP/ExportOptions.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ inputs.export-method }}</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/build/${{ inputs.scheme }}.xcarchive" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

          IPA=$(find "$EXPORT_DIR" -name "*.ipa" | head -1)
          echo "ipa-path=$IPA" >> $GITHUB_OUTPUT
          echo "IPA exported: $IPA"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.scheme }}-${{ github.sha }}
          path: ${{ steps.export.outputs.ipa-path }}
          retention-days: 7

      # ── Cleanup — always runs, even on failure ───────────────────────────────
      - name: Clean up signing assets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/profile.mobileprovision" 2>/dev/null || true
          echo "All signing assets cleaned up"
